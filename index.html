<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GIDEON: Sfiral Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">GIDEON CORE | SFIRAL TOPOLOGY | 1.5M POINTS</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 2;

        async function init() {
            // Загрузка твоего бинарного файла (ядра)
            const response = await fetch('gideon_model.bin');
            const buffer = await response.arrayBuffer();
            const positions = new Float32Array(buffer);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({ 
                size: 0.0015, 
                color: 0x00ffcc,
                transparent: true,
                opacity: 0.6 
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);

            function animate() {
                requestAnimationFrame(animate);
                points.rotation.y += 0.001; // Вращение Сфирали
                renderer.render(scene, camera);
            }
            animate();
        }
        init();
    </script>
</body>
</html>
